<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #3d3d3a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
    .t  { font-size: 14px; font-weight: 400; }

    .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text   { fill: #085041; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-coral rect  { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text  { fill: #712B13; }
    .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text   { fill: #444441; }
    .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text   { fill: #0C447C; }
    .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text  { fill: #633806; }

    .node { cursor: pointer; }
    .node:hover { opacity: 0.8; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  </style>
</defs>

<!-- Row 0 label -->
<text class="ts" x="340" y="22" text-anchor="middle">Inputs</text>

<!-- Input nodes -->
<g class="node c-teal">
  <rect x="40" y="30" width="140" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="110" y="52" text-anchor="middle" dominant-baseline="central">Webcam feed</text>
  <text class="ts" x="110" y="68" text-anchor="middle" dominant-baseline="central">Real-time video</text>
</g>
<g class="node c-teal">
  <rect x="270" y="30" width="140" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">Input photo</text>
  <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">One-time setup</text>
</g>
<g class="node c-teal">
  <rect x="500" y="30" width="140" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="570" y="52" text-anchor="middle" dominant-baseline="central">Text / LLM prompt</text>
  <text class="ts" x="570" y="68" text-anchor="middle" dominant-baseline="central">Personality &amp; style</text>
</g>

<!-- Row 1 label -->
<text class="ts" x="340" y="130" text-anchor="middle">Processing layer</text>

<!-- Processing nodes -->
<g class="node c-purple">
  <rect x="20" y="140" width="170" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="105" y="162" text-anchor="middle" dominant-baseline="central">MediaPipe</text>
  <text class="ts" x="105" y="178" text-anchor="middle" dominant-baseline="central">Pose + Face Mesh</text>
</g>
<g class="node c-purple">
  <rect x="215" y="140" width="170" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="300" y="162" text-anchor="middle" dominant-baseline="central">Avatar generator</text>
  <text class="ts" x="300" y="178" text-anchor="middle" dominant-baseline="central">Color extract or diffusion</text>
</g>
<g class="node c-purple">
  <rect x="410" y="140" width="170" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="495" y="162" text-anchor="middle" dominant-baseline="central">LLM engine</text>
  <text class="ts" x="495" y="178" text-anchor="middle" dominant-baseline="central">Trait JSON + behavior</text>
</g>

<!-- Row 2 label -->
<text class="ts" x="340" y="250" text-anchor="middle">Avatar runtime core</text>

<!-- Core nodes -->
<g class="node c-coral">
  <rect x="40" y="260" width="155" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="117" y="282" text-anchor="middle" dominant-baseline="central">Motion retargeter</text>
  <text class="ts" x="117" y="298" text-anchor="middle" dominant-baseline="central">Angle-based IK mapping</text>
</g>
<g class="node c-coral">
  <rect x="220" y="260" width="155" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="297" y="282" text-anchor="middle" dominant-baseline="central">Skeleton + mesh</text>
  <text class="ts" x="297" y="298" text-anchor="middle" dominant-baseline="central">Joints, weights, IK</text>
</g>
<g class="node c-coral">
  <rect x="400" y="260" width="155" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="477" y="282" text-anchor="middle" dominant-baseline="central">Asset manager</text>
  <text class="ts" x="477" y="298" text-anchor="middle" dominant-baseline="central">Sprite atlas, accessories</text>
</g>

<!-- Row 3 label -->
<text class="ts" x="340" y="370" text-anchor="middle">Config &amp; persistence</text>

<!-- Config nodes -->
<g class="node c-gray">
  <rect x="100" y="380" width="175" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="187" y="402" text-anchor="middle" dominant-baseline="central">Avatar config</text>
  <text class="ts" x="187" y="418" text-anchor="middle" dominant-baseline="central">JSON / YAML export</text>
</g>
<g class="node c-gray">
  <rect x="310" y="380" width="175" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="397" y="402" text-anchor="middle" dominant-baseline="central">Database</text>
  <text class="ts" x="397" y="418" text-anchor="middle" dominant-baseline="central">Avatar profiles + assets</text>
</g>

<!-- Row 4 label -->
<text class="ts" x="340" y="490" text-anchor="middle">Output targets</text>

<!-- Output nodes -->
<g class="node c-blue">
  <rect x="20" y="500" width="130" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="85" y="522" text-anchor="middle" dominant-baseline="central">Python demo</text>
  <text class="ts" x="85" y="538" text-anchor="middle" dominant-baseline="central">Pygame / OpenCV</text>
</g>
<g class="node c-blue">
  <rect x="175" y="500" width="130" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="240" y="522" text-anchor="middle" dominant-baseline="central">Web demo</text>
  <text class="ts" x="240" y="538" text-anchor="middle" dominant-baseline="central">PixiJS / Phaser.js</text>
</g>
<g class="node c-blue">
  <rect x="330" y="500" width="130" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="395" y="522" text-anchor="middle" dominant-baseline="central">Godot 4</text>
  <text class="ts" x="395" y="538" text-anchor="middle" dominant-baseline="central">Import JSON config</text>
</g>
<g class="node c-blue">
  <rect x="485" y="500" width="130" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="522" text-anchor="middle" dominant-baseline="central">iOS app</text>
  <text class="ts" x="550" y="538" text-anchor="middle" dominant-baseline="central">MediaPipe iOS SDK</text>
</g>

<!-- Monitoring -->
<g class="node c-amber">
  <rect x="200" y="580" width="280" height="30" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="595" text-anchor="middle" dominant-baseline="central">Rerun.io monitoring dashboard</text>
</g>

<!-- Arrows: inputs → processing -->
<line x1="110" y1="80" x2="105" y2="138" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>
<line x1="340" y1="80" x2="300" y2="138" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>
<line x1="570" y1="80" x2="495" y2="138" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>

<!-- Arrows: processing → core -->
<line x1="105" y1="190" x2="117" y2="258" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>
<line x1="300" y1="190" x2="297" y2="258" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>
<line x1="495" y1="190" x2="477" y2="258" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>

<!-- Arrows: core → config -->
<line x1="297" y1="310" x2="250" y2="378" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>
<line x1="477" y1="310" x2="420" y2="378" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>

<!-- Arrows: config → outputs -->
<line x1="250" y1="430" x2="150" y2="498" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>
<line x1="280" y1="430" x2="240" y2="498" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>
<line x1="350" y1="430" x2="370" y2="498" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>
<line x1="430" y1="430" x2="520" y2="498" class="arr" marker-end="url(#arrow)" stroke-opacity="0.4"/>

<!-- Monitoring arrow -->
<line x1="240" y1="550" x2="300" y2="578" class="arr" marker-end="url(#arrow)" stroke-opacity="0.3"/>
</svg>
